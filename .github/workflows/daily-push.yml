# ============================================================
# 财经+AI 新闻早报机器人 — GitHub Actions 定时调度
# ============================================================
# 北京时间每天 9:30 执行 (UTC 1:30)
# 也支持手动触发 (workflow_dispatch) 用于测试
# ============================================================

name: "📰 每日新闻早报推送"

on:
  schedule:
    # 北京时间 9:30 = UTC 1:30
    - cron: "30 1 * * *"

  # 手动触发（在 GitHub Actions 页面点击 "Run workflow"）
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1"

# 允许 workflow 推送代码（用于提交 history.json）
permissions:
  contents: write

jobs:
  daily-news-push:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行新闻早报机器人
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: python main.py

      - name: 提交 history.json 更新
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json
          if git diff --staged --quiet; then
            echo "history.json 无变化，跳过提交"
          else
            git commit -m "chore: update history.json [skip ci]"
            git push
            echo "history.json 已提交并推送"
          fi

      - name: 上传运行日志 (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-bot-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
